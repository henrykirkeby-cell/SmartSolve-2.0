<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upgrade Successful — SolveMate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(145deg, #2e7d32 0%, #1b5e20 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    }
    .emoji { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 26px; font-weight: 800; color: #1b5e20; margin-bottom: 12px; }
    p  { font-size: 15px; color: #555; line-height: 1.7; margin-bottom: 28px; }
    .badge {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      font-weight: 700;
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 28px;
      border: 1.5px solid #a5d6a7;
    }
    a.btn {
      display: inline-block;
      background: #4CAF50;
      color: white;
      padding: 13px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      transition: background 0.2s;
    }
    a.btn:hover { background: #43a047; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎉</div>
    <h1>You're now on Pro!</h1>
    <div class="badge">⭐ Pro Plan Active</div>
    <p>
      Your subscription is confirmed. You now have
      <strong>unlimited questions</strong> — no more limits.<br><br>
      Head over to McGraw Hill Connect, open the extension, and keep going!
    </p>
    <a class="btn" href="/">Back to Dashboard →</a>
  </div>
</body>
</html>
